<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Compare</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>
  <canvas id="canvas"></canvas>
  <div id="controls">
    <button id="mode-btn">Switch to Compare</button>
    <button id="delete-all-btn">Delete All</button>
    <div id="rotation-row">
      <label for="rotation-slider">Rotation: <span id="rotation-value">0</span>°</label>
      <input type="range" id="rotation-slider" min="-180" max="180" value="0" step="1" />
    </div>
    <div id="instructions">
      <strong>Draw Mode:</strong> click to add points, double-click to close polygon
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
